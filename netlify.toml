[build]
  publish = "build"
  functions = "functions"
  command = "rm -rf node_modules && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/auth/patreon"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/story"
  to = "/story.html"
  status = 200

[[redirects]]
  from = "/why-free"
  to = "/why-free.html"
  status = 200

[[redirects]]
  from = "/ebay-listing-tool-for-adhd"
  to = "/ebay-listing-tool-for-adhd.html"
  status = 200